<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Search Results</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f8fb;
    color:#1a1a1a;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 30px;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,119,204,.06);
}

.header h1{
    margin:0;
    font-size:20px;
    color:#0077cc;
}

.btn{
    padding:6px 14px;
    border-radius:6px;
    background:#0077cc;
    color:#fff;
    text-decoration:none;
    font-size:13px;
    transition:.2s;
}

.btn:hover{
    background:#005fa3;
}

/* Container */
.container{
    max-width:720px;
    margin:35px auto;
    padding:0 18px;
}

/* Search Info */
.search-info{
    background:#fff;
    padding:18px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 6px 16px rgba(0,119,204,.06);
}

.search-info h2{
    margin:0 0 6px;
    font-size:16px;
    color:#0077cc;
}

.search-info p{
    margin:0;
    font-size:13px;
    color:#666;
}

/* Article */
.article{
    display:block;
    background:#fff;
    padding:18px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 6px 16px rgba(0,119,204,.06);
    text-decoration:none;
    color:inherit;
    transition:.2s;
}

.article:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(0,119,204,.12);
}

.article-title{
    margin:0 0 5px;
    font-size:17px;
    color:#0077cc;
}

.meta{
    font-size:12px;
    color:#7a8a99;
    margin-bottom:8px;
}

.content{
    font-size:14px;
    line-height:1.5;
    color:#333;

    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* Empty */
.empty{
    background:#fff;
    padding:25px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
    color:#777;
    box-shadow:0 6px 16px rgba(0,119,204,.06);
}
</style>
</head>

<body>

<div class="header">
    <h1>Search Results</h1>
    <a href="/" class="btn">← Back Home</a>
</div>

<div class="container">

    <div class="search-info">
        <h2>Search: "{{.Query}}"</h2>
        <p>Articles found: <strong>{{len .Articles}}</strong></p>
    </div>

    {{range .Articles}}
    <a href="/articles/{{.ID}}" class="article">
        <h3 class="article-title">{{.Title}}</h3>
        <div class="meta">{{.Published}}</div>
        <div class="content">
            {{.Content}}
        </div>
    </a>
    {{else}}
    <div class="empty">
        No articles found for "<strong>{{.Query}}</strong>".
    </div>
    {{end}}

</div>

</body>
</html>

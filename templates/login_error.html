<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Error</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f8fb;
}

.container{
    max-width:420px;
    margin:140px auto;
    padding:0 15px;
}

.error-card{
    background:white;
    padding:35px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,119,204,.1);
    text-align:center;
}

.error-title{
    font-size:20px;
    color:#e74c3c;
    margin-bottom:10px;
}

.error-text{
    font-size:14px;
    color:#555;
    margin-bottom:25px;
}

.btn{
    display:block;
    width:100%;
    padding:10px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
    transition:.2s;
    box-sizing:border-box;
    margin-bottom:10px;
}

.btn-primary{
    background:#0077cc;
    color:white;
}

.btn-primary:hover{
    background:#005fa3;
}

.btn-outline{
    border:1px solid #0077cc;
    color:#0077cc;
}

.btn-outline:hover{
    background:#0077cc;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <div class="error-card">

        <div class="error-title">Login Failed</div>
        <div class="error-text">
            Invalid username or password.
        </div>

        <a href="/login" class="btn btn-primary">Try Again</a>
        <a href="/home" class="btn btn-outline">← Back Home</a>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Article</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f8fb;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:white;
    box-shadow:0 2px 10px rgba(0,119,204,.08);
}

.header h1{
    margin:0;
    font-size:20px;
    color:#0077cc;
}

/* Buttons */
.btn{
    padding:6px 14px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    font-size:14px;
    text-decoration:none;
    transition:.2s;
}

.btn-outline{
    background:transparent;
    border:1px solid #0077cc;
    color:#0077cc;
}

.btn-outline:hover{
    background:#0077cc;
    color:white;
}

.btn-primary{
    background:#0077cc;
    color:white;
}

.btn-primary:hover{
    background:#005fa3;
}

/* Container */
.container{
    max-width:650px;
    margin:40px auto;
    padding:0 15px;
}

.form-card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,119,204,.08);
}

.form-card h2{
    margin-top:0;
    margin-bottom:20px;
    color:#0077cc;
}

/* Form */
.form-group{
    margin-bottom:14px;
}

label{
    display:block;
    font-weight:500;
    margin-bottom:5px;
    font-size:14px;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #dbe3ea;
    font-size:14px;
    transition:.2s;
    box-sizing:border-box;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:#0077cc;
    box-shadow:0 0 0 3px rgba(0,119,204,.08);
}

textarea{
    min-height:140px;
    resize:vertical;
}

.form-actions{
    margin-top:18px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Dashboard</h1>
    <a href="/dashboard" class="btn btn-outline">← Back</a>
</div>

<div class="container">
    <div class="form-card">
        <h2>New Article</h2>

        <form action="/new" method="POST">

            <div class="form-group">
                <label>Article Title</label>
                <input type="text" name="title" required>
            </div>

            <div class="form-group">
                <label>Publishing Date</label>
                <input type="date" name="published" required>
            </div>

            <div class="form-group">
                <label>Content</label>
                <textarea name="content" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Publish</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
   <title>Login</title>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <style>
      body {
         margin: 0;
         font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #f4f8fb;
      }

      .container {
         max-width: 400px;
         margin: 120px auto;
         padding: 0 15px;
      }

      .login-card {
         background: white;
         padding: 35px;
         border-radius: 14px;
         box-shadow: 0 10px 30px rgba(0, 119, 204, .1);
      }

      .login-card h2 {
         margin-top: 0;
         margin-bottom: 25px;
         text-align: center;
         color: #0077cc;
      }

      input {
         width: 100%;
         padding: 11px;
         margin-bottom: 15px;
         border-radius: 6px;
         border: 1px solid #dbe3ea;
         font-size: 14px;
         box-sizing: border-box;
         transition: .2s;
      }

      input:focus {
         outline: none;
         border-color: #0077cc;
         box-shadow: 0 0 0 3px rgba(0, 119, 204, .08);
      }

      button {
         width: 100%;
         padding: 11px;
         border: none;
         border-radius: 6px;
         background: #0077cc;
         color: white;
         font-size: 15px;
         cursor: pointer;
         transition: .2s;
         margin-bottom: 10px;
      }

      button:hover {
         background: #005fa3;
      }

      .back-btn {
         display: block;
         width: 100%;
         padding: 10px;
         text-align: center;
         border-radius: 6px;
         border: 1px solid #0077cc;
         color: #0077cc;
         text-decoration: none;
         font-size: 14px;
         transition: .2s;
         box-sizing: border-box;
      }

      .back-btn:hover {
         background: #0077cc;
         color: white;
      }

   </style>
</head>

<body>

   <div class="container">
      <div class="login-card">

         <h2>Admin Login</h2>

         <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
         </form>

         <a href="/home" class="back-btn">← Back Home</a>

      </div>
   </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f8fb;
            color: #1a1a1a;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            box-shadow: 0 2px 10px rgba(0, 119, 204, 0.08);
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            color: #0077cc;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background-color: #0077cc;
            color: white;
        }

        .btn-primary:hover {
            background-color: #005fa3;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0077cc;
            color: #0077cc;
        }

        .btn-outline:hover {
            background: #0077cc;
            color: white;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* Article Card */
        .article {
            background: white;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 119, 204, 0.08);
            transition: 0.2s ease;
        }

        .article:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(0, 119, 204, 0.15);
        }

        .article-title {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .article-date {
            font-size: 13px;
            color: #7a8a99;
            margin-bottom: 15px;
        }

        .article-content {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;

            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-buttons {
            display: flex;
            gap: 10px;
        }

        .empty {
            background: white;
            padding: 30px;
            border-radius: 14px;
            text-align: center;
            color: #7a8a99;
            box-shadow: 0 10px 30px rgba(0, 119, 204, 0.08);
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Dashboard</h1>

        <div class="header-buttons">
            <a href="/home" class="btn btn-outline">← Back Home</a>
            <a href="/new" class="btn btn-primary">+ Add</a>
            <a href="/logout" class="btn btn-outline">Logout</a>
        </div>
    </div>

    <div class="container">

        {{range .}}
        <div class="article">
            <div class="article-title">{{.Title}}</div>
            <div class="article-date">{{.Published}}</div>

            <div class="article-content">
                {{.Content}}
            </div>

            <div class="article-buttons">
                <a href="/edit/{{.ID}}" class="btn btn-primary">Edit</a>
                <button onclick="deleteArticle('{{.ID}}')" class="btn btn-danger">Delete</button>
            </div>
        </div>

        {{else}}
        <div class="empty">
            No articles found.
        </div>
        {{end}}

    </div>

    <script>
        async function deleteArticle(id) {
            const response = await fetch('/delete/' + id, {
                method: 'DELETE'
            });

            if (response.ok) {
                location.reload();
            } else {
                alert("Failed to delete article");
            }
        }
    </script>

</body>

</html>
